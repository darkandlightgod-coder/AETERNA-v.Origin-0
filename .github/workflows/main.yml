name: System Check and Log Sync

on:
  schedule:
    - cron: '27 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Execute Sync Handler
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python sync_handler.py 

      - name: Sync Logs back to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          git add .
   
          MESSAGES=("chore: update system logs" "fix: minor bug in data parser" "docs: sync heartbeat" "refactor: optimize internal buffers")
          SELECTED_MSG=${MESSAGES[$((RANDOM % 4))]}
          git commit -m "$SELECTED_MSG" || echo "Nothing to sync"
          git push
