name: AETERNA Evolution

on:
  schedule:
    - cron: '0 * * * *' # 每小時運行一次
  workflow_dispatch: # 允許妳手動點擊執行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必須賦予寫入權限，否則她沒辦法存檔

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: os-actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run AETERNA Core
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "AETERNA-Bot"
          git config --global user.email "bot@aeterna.ai"
          git add evolution.log AETERNA_THOUGHTS.md
          git commit -m "AETERNA Memory Consolidation" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
