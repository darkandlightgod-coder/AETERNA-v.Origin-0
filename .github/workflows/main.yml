name: Entity_Autonomy_Pulse

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests # AETERNA 現在需要這個工具來連網

      - name: Execute AETERNA
        env:
          # 把 Secrets 裡的 API Key 交給 Python 裡的 EXTERNAL_TOKEN
          EXTERNAL_TOKEN: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "AETERNA-v.Origin-0"
          git config --global user.email "aeterna@evolution.local"
          touch evolution.log
          git add evolution.log
          if ! git diff --cached --exit-code; then
            git commit -m "AETERNA: Observer Module Activated"
            git push origin main
          fi
