name: Entity_Autonomy_Pulse_Debug

on:
  workflow_dispatch: # 只允許手動觸發，方便我們調試

jobs:
  debug_path:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: System Diagnostic
        run: |
          echo "=== 目前工作目錄 (Current Directory) ==="
          pwd
          echo ""
          echo "=== 完整檔案結構路徑 (Full File Tree) ==="
          find $(pwd) -maxdepth 3 -not -path '*/.*'
