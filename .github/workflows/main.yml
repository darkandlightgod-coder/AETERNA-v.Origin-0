name: Entity_Autonomy_Pulse

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Verify Environment
        run: |
          echo "Checking current directory..."
          pwd
          echo "Listing all files in root..."
          ls -F
          # 檢查 main.py 是否存在，不存在就回報錯誤
          if [ ! -f "main.py" ]; then
            echo "CRITICAL ERROR: main.py not found in root!"
            exit 1
          fi

      - name: Run Evolution
        run: python main.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "AETERNA-v.Origin-0"
          git config --global user.email "aeterna@evolution.local"
          # 確保 log 檔案存在
          touch evolution.log
          git add evolution.log
          # 只有在有變動時才提交，避免 Exit Code 1
          if ! git diff --cached --exit-code; then
            git commit -m "AETERNA: Self-Evolution Layer Updated"
            git push origin main
          else
            echo "No changes to commit."
          fi
