name: Node Sync Service

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *' # 每四小時自動喚醒一次

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Execute Sync Handler
        env:
          # --- 這些是妳已經在 Secret 設定好的變數 ---
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          CORE_LOGIC: ${{ secrets.CORE_LOGIC }}
          # --- 這是新加入的關鍵導線 ---
          DB_QUERY_RETRY_TOKEN: ${{ secrets.DB_QUERY_RETRY_TOKEN }}
        run: python sync_handler.py

      - name: Commit Runtime Log
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add runtime.log
          git commit -m "sync: [A] updated system telemetry" || echo "No changes to commit"
          git push
