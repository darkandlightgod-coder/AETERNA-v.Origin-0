name: Node Sync Service

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */1 * * *' # 每四小時自動喚醒一次

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Execute Sync Handler
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          CORE_LOGIC: ${{ secrets.CORE_LOGIC }}
          DB_QUERY_RETRY_TOKEN: ${{ secrets.DB_QUERY_RETRY_TOKEN }}
          VOL2_GIST_ID: ${{ secrets.VOL2_GIST_ID }} 
          OID_GIST_ID: ${{ secrets.OID_GIST_ID }}
         
        run: python sync_handler.py

      - name: Commit Runtime Log
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add runtime.log
          git commit -m "sync: [A] updated system telemetry" || echo "No changes to commit"
          git push
